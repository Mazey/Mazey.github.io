<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Config Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page">

        <header class="topbar">
            <h1>Dice Have No Eyes custom character creator</h1>

            <button
                class="download-btn"
                type="button"
                onclick="downloadLua()">
                Download Lua
            </button>
        </header>

        <div class="editor-layout">

            <div class="main-column">

                <section class="card">
                    <h2>Character</h2>
                    <div id="fields"></div>
                </section>

                <section class="card">
                    <div class="section-header">
                        <h2>Dice</h2>
                    </div>

                    <div id="diceContainer"></div>

                    <button
                        type="button"
                        class="add-dice-btn"
                        onclick="addDie()">
                        +
                    </button>
                </section>

            </div>

            <div class="side-column">

                <section class="card">
                    <h2>Dialogues</h2>

                    <div id="dialogueFields"></div>
                </section>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
